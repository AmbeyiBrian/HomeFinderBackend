# appspec.yml
version: 0.0
os: linux
files:
  - source: /
    destination: /var/www/django-app/
hooks:
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 300
      runas: root
  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 300
      runas: root
  ApplicationStart:
    - location: scripts/start_application.sh
      timeout: 300
      runas: root
  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 300
      runas: root

# Set execute permissions for scripts
chmod +x /var/www/django-app/scripts/*.sh
# scripts/before_install.sh
#!/bin/bash
# Create application directory
mkdir -p /var/www/django-app
# Install system dependencies
apt-get update
apt-get install -y python3.12 python3.12-venv python3-pip nginx supervisor

# scripts/after_install.sh
#!/bin/bash
cd /var/www/django-app

# Create and activate virtual environment
python3.12 -m venv venv
source venv/bin/activate

# Install Python dependencies
pip install -r requirements.txt

# Run migrations
python manage.py migrate --noinput

# Collect static files
python manage.py collectstatic --noinput

# Configure Nginx
cat > /etc/nginx/sites-available/django-app <<EOL
server {
    listen 80;
    server_name _;

    location /static/ {
        alias /var/www/django-app/static/;
    }

    location /media/ {
        alias /var/www/django-app/media/;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
    }
}
EOL

# Enable the Nginx site
ln -sf /etc/nginx/sites-available/django-app /etc/nginx/sites-enabled/
rm -f /etc/nginx/sites-enabled/default

# Configure Supervisor
cat > /etc/supervisor/conf.d/django-app.conf <<EOL
[program:django-app]
command=/var/www/django-app/venv/bin/gunicorn --workers 3 --bind 127.0.0.1:8000 HomeFinderBackend.wsgi:application
directory=/var/www/django-app
user=www-data
autostart=true
autorestart=true
stderr_logfile=/var/log/django-app.err.log
stdout_logfile=/var/log/django-app.out.log
EOL

# Create environment file
cat > /var/www/django-app/.env <<EOL
DEBUG=False
ALLOWED_HOSTS=*
DATABASE_URL=postgres://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOST}:5432/${DB_NAME}
SECRET_KEY=${DJANGO_SECRET_KEY}
EOL

# Set proper permissions
chown -R www-data:www-data /var/www/django-app
chmod -R 755 /var/www/django-app

# scripts/start_application.sh
#!/bin/bash
# Reload Nginx configuration
systemctl reload nginx

# Restart Supervisor
supervisorctl reread
supervisorctl update
supervisorctl restart django-app

# scripts/validate_service.sh
#!/bin/bash
# Check if Nginx is running
if ! systemctl is-active --quiet nginx; then
    echo "Nginx is not running"
    exit 1
fi

# Check if application is responding
if ! curl -s http://localhost > /dev/null; then
    echo "Application is not responding"
    exit 1
fi

echo "Application deployment validated successfully"
exit 0

