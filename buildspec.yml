version: 0.2

phases:
  install:
    commands:
      # Install OpenSSL and development libraries required to build Python with SSL support
      - yum install -y openssl-devel
      - pip install --upgrade pip
      - echo "Using pre-installed Python 3.12 runtime"
      - pyenv install 3.12.0
      - pyenv global 3.12.0
      - python --version

  pre_build:
    commands:
      - echo "Installing Python packages..."
      - pip install -r requirements.txt

  build:
    commands:
      - echo "Running collectstatic..."
      - python manage.py collectstatic --noinput

artifacts:
  files:
    - '**/*'
  discard-paths: no
