version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - echo "Installing system dependencies..."
      - yum update -y
      - yum install -y openssl-devel postgresql-devel gcc python3-devel

  pre_build:
    commands:
      - echo "Installing Python packages..."
      - python -m pip install --upgrade pip
      - pip install -r requirements.txt

  build:
    commands:
      - echo "Running collectstatic..."
      - python manage.py collectstatic --noinput
      # Add environment variable for Django to run collectstatic
      - export DJANGO_SETTINGS_MODULE=HomeFinderBackend.settings

  post_build:
    commands:
      - echo "Creating Elastic Beanstalk configuration files..."
      # Create necessary .ebextensions if they don't exist in source
      - mkdir -p .ebextensions
      - |
        cat << 'EOF' > .ebextensions/01_django.config
        option_settings:
          aws:elasticbeanstalk:container:python:
            WSGIPath: HomeFinderBackend.wsgi:application
          aws:elasticbeanstalk:application:environment:
            DJANGO_SETTINGS_MODULE: HomeFinderBackend.settings
        EOF
      # Create Procfile if it doesn't exist in source
      - |
        cat << 'EOF' > Procfile
        web: gunicorn HomeFinderBackend.wsgi:application --bind 0.0.0.0:8000
        EOF

artifacts:
  files:
    - '**/*'
  base-directory: '.'
  discard-paths: no