version: 0.2

phases:
  install:
    commands:
      - pip install --upgrade pip
      - echo "Using pre-installed Python 3.12 runtime"
      - python --version

  pre_build:
    commands:
      - echo "Installing Python packages..."
      - pip install -r requirements.txt

  build:
    commands:
      - echo "Running collectstatic..."
      - python manage.py collectstatic --noinput

artifacts:
  files:
    - '**/*'
  discard-paths: no
